<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Oasis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.5s ease;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5em;
            color: #6a5acd;
        }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            background-color: #6a5acd;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #483d8b;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.7);
            padding-top: 60px;
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 10px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .option {
            background-color: #ffe4e1;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s;
        }
        .option:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to Mental Health Oasis</h1>
        <p>Your safe space for relaxation and self-care</p>
        <button onclick="showModal()">Explore</button>
    </header>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Explore Your Options</h2>
            <div class="options">
                <div class="option">🎮 Games</div>
                <div class="option">🗣️ Talk with a Stranger</div>
                <div class="option">🧘‍♀️ Stress Relief Yoga</div>
                <div class="option">💬 One-on-One Counseling</div>
                <div class="option">🎥 Motivational Videos</div>
                <div class="option">🎶 Music Therapy</div>
                <div class="option">🧘 Mindfulness Meditation</div>
                <div class="option">🎨 Create Art Therapy</div>
                <div class="option">📚 Resources</div>
            </div>
        </div>
    </div>

    <script>
        function showModal() {
            document.getElementById("myModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target === document.getElementById("myModal")) {
                closeModal();
            }
        }
    </script>

</body>
</html>
